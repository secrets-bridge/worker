name: docker-publish

# Publishes the worker image to GHCR.
#
# Tagging strategy:
#   - Push to `main`               → `dev`, `main`, `sha-<short>`
#   - Push tag `v0.1.0` (semver)   → `v0.1.0`, `v0.1`, `0`, `latest`
#                                    (the `latest` alias activates only
#                                     for non-prerelease tags)
#   - workflow_dispatch            → `dev`-only (manual rebuild)
#
# Until v0.1.0 ships, every consumer should pin
# `ghcr.io/secrets-bridge/worker:dev` — it's the rolling tag pointing
# at the latest `main` build. Post-v0.1.0, consumers switch to either
# a pinned `vMAJOR.MINOR.PATCH` for reproducibility or `latest` for
# rolling stable.
#
# This repo's `go.mod` declares `replace github.com/secrets-bridge/api
# => ../api` for local polyrepo dev. The Dockerfile runs
# `go mod download` BEFORE `COPY . .` for build-cache layering, which
# means any in-context staging of `../api` wouldn't exist at that
# layer anyway. The cleanest path is to STRIP the local replace
# directive in CI before `docker build`; goproxy then resolves
# `github.com/secrets-bridge/api` via the pseudo-version already
# pinned in `go.sum`. `main`'s go.mod keeps the `../api` form so
# local dev keeps working.
#
# Multi-arch (linux/amd64 + linux/arm64). First-build cold-cache run
# on a GitHub-hosted runner takes ~15-25 min with QEMU; subsequent
# runs hit the GHA cache and finish in 1-3 min.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: build + push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Drop local replace + bump api pin to main
        run: |
          # `go.mod` carries `replace github.com/secrets-bridge/api =>
          # ../api` for local polyrepo dev. For the docker build we
          # strip the replace AND bump the pinned version to the
          # current api/main HEAD so goproxy resolves a pseudo-version
          # that matches what main expects (e.g. the SB_ENV gate
          # added in api#41 needs api's keymgmt.FromEnv signature).
          #
          # When the api module gets a real semver tag, swap this for
          # `go get github.com/secrets-bridge/api@vX.Y.Z` and pin in
          # go.mod permanently.
          go mod edit -dropreplace github.com/secrets-bridge/api
          go get github.com/secrets-bridge/api@main
          go mod tidy
          echo "--- go.mod after edit ---"
          grep -E '^(require|replace)' go.mod | head
          grep 'secrets-bridge/api' go.mod || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=secrets-bridge-worker
            org.opencontainers.image.description=Secrets Bridge background workers (sweepers + gitops poller)
            org.opencontainers.image.vendor=secrets-bridge
            org.opencontainers.image.source=https://github.com/secrets-bridge/worker
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output published tags
        run: |
          echo "Published tags:"
          echo "${{ steps.meta.outputs.tags }}"
