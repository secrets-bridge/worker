name: docker-publish

# Publishes the worker image to GHCR.
#
# Tagging strategy:
#   - Push to `main`               → `dev`, `main`, `sha-<short>`
#   - Push tag `v0.1.0` (semver)   → `v0.1.0`, `v0.1`, `0`, `latest`
#                                    (the `latest` alias activates only
#                                     for non-prerelease tags)
#   - workflow_dispatch            → `dev`-only (manual rebuild)
#
# Until v0.1.0 ships, every consumer should pin
# `ghcr.io/secrets-bridge/worker:dev` — it's the rolling tag pointing
# at the latest `main` build. Post-v0.1.0, consumers switch to either
# a pinned `vMAJOR.MINOR.PATCH` for reproducibility or `latest` for
# rolling stable.
#
# This repo's go.mod declares `replace github.com/secrets-bridge/api
# => ../api` for local polyrepo dev. For the docker build, the api
# source is staged INSIDE the worker context under `.deps/api/` and
# the replace path is rewritten to `./.deps/api` so the Dockerfile's
# `COPY . .` brings both worker and api into the build stage. Removed
# again when the api module gets a real semver tag.
#
# Multi-arch (linux/amd64 + linux/arm64). First-build cold-cache run
# on a GitHub-hosted runner takes ~15-25 min with QEMU; subsequent
# runs hit the GHA cache and finish in 1-3 min.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: build + push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout worker
        uses: actions/checkout@v4
        with:
          path: worker

      - name: Checkout api (the replace-directive source)
        uses: actions/checkout@v4
        with:
          repository: secrets-bridge/api
          path: api-source

      - name: Stage api source under worker/.deps/api
        run: |
          # The docker build context is `worker/`. Anything the
          # Dockerfile's `COPY . .` needs must live inside it. We move
          # the api source under `worker/.deps/api/` and rewrite the
          # replace directive so it resolves inside the build stage.
          mkdir -p worker/.deps
          mv api-source worker/.deps/api
          cd worker
          # Replace the local-dev path (../api) with the in-context path.
          # The rewrite happens on a checkout copy — no commit to the
          # source tree; only the published image sees it.
          sed -i 's|replace github.com/secrets-bridge/api => ../api|replace github.com/secrets-bridge/api => ./.deps/api|' go.mod
          echo "--- go.mod replace lines after rewrite ---"
          grep -E '^replace' go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=secrets-bridge-worker
            org.opencontainers.image.description=Secrets Bridge background workers (sweepers + gitops poller)
            org.opencontainers.image.vendor=secrets-bridge
            org.opencontainers.image.source=https://github.com/secrets-bridge/worker
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output published tags
        run: |
          echo "Published tags:"
          echo "${{ steps.meta.outputs.tags }}"
